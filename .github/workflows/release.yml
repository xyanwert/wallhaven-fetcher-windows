name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub releases + upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $ver"

      - name: Restore + Publish (self-contained, single-file)
        shell: pwsh
        run: |
          dotnet publish src/WallhavenFetcher/WallhavenFetcher.csproj `
            -c Release `
            -r win-x64 `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 `
            -p:FileVersion=${{ steps.version.outputs.version }}.0 `
            -o publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          iscc /DVersion=${{ steps.version.outputs.version }} `
               installer\WallhavenFetcher.iss

      - name: Create GitHub release + upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/WallhavenFetcherSetup-${{ steps.version.outputs.version }}.exe
          body: |
            # Wallhaven Fetcher v${{ steps.version.outputs.version }}

            Native Windows tray app for daily wallpaper sync from wallhaven.cc and konachan.com.

            ## Install
            Download `WallhavenFetcherSetup-${{ steps.version.outputs.version }}.exe` below and run it.
            The installer optionally adds the app to your login items.

            ## First-time setup
            1. (Recommended) Drop your wallhaven API key at:
               `%APPDATA%\WallhavenFetcher\api_key`
            2. Open Windows Settings → Personalization → Background → Slideshow,
               point it at `%USERPROFILE%\Pictures\Wallhaven\`
            3. Right-click the tray icon → Sync now
          generate_release_notes: true
